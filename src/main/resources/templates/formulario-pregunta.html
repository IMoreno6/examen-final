<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Formulario de Pregunta - Gesti&oacute;n de Preguntas</title>
    <link th:href="@{/bootstrap/bootstrap.min.css}" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
    <nav th:replace="~{fragments/menu :: navbar}"></nav>
    <div class="container">
        <div class="form-card">
            <h1 th:if="${pregunta.id != null}">Editar Pregunta</h1>
            <h1 th:unless="${pregunta.id != null}">Nueva Pregunta</h1>

            <form th:action="@{/preguntas/guardar}" th:object="${pregunta}" method="post">
                <input type="hidden" th:field="*{id}">

                <div class="mb-3">
                    <label class="form-label">Enunciado</label>
                    <input type="text" class="form-control" th:field="*{enunciado}" placeholder="Ingrese el enunciado de la pregunta">
                    <div class="error-text" th:if="${#fields.hasErrors('enunciado')}" th:errors="*{enunciado}"></div>
                </div>

                <div class="row">
                    <div class="col-md-3 mb-3">
                        <label class="form-label">Puntaje</label>
                        <input type="number" step="0.01" class="form-control" th:field="*{puntaje}" placeholder="0.00">
                        <div class="error-text" th:if="${#fields.hasErrors('puntaje')}" th:errors="*{puntaje}"></div>
                    </div>

                    <div class="col-md-3 mb-3">
                        <label class="form-label">Dificultad (1-5)</label>
                        <input type="number" class="form-control" th:field="*{dificultad}" placeholder="1" min="1" max="5">
                        <div class="error-text" th:if="${#fields.hasErrors('dificultad')}" th:errors="*{dificultad}"></div>
                    </div>

                    <div class="col-md-3 mb-3">
                        <label class="form-label">Tipo</label>
                        <select class="form-select" th:field="*{tipo}">
                            <option value="">-- Seleccionar tipo --</option>
                            <option value="VF">Verdadero / Falso</option>
                            <option value="SELECCION_UNICA">Selecci&oacute;n &Uacute;nica</option>
                            <option value="SELECCION_MULTIPLE">Selecci&oacute;n M&uacute;ltiple</option>
                        </select>
                        <div class="error-text" th:if="${#fields.hasErrors('tipo')}" th:errors="*{tipo}"></div>
                    </div>

                    <div class="col-md-3 mb-3">
                        <label class="form-label">Tem&aacute;tica</label>
                        <select class="form-select" th:field="*{tematica}">
                            <option value="">-- Seleccionar tem&aacute;tica --</option>
                            <option th:each="tem : ${tematicas}" th:value="${tem.id}" th:text="${tem.nombre}"></option>
                        </select>
                    </div>
                </div>

                <div th:if="*{tipo} == 'VF'" class="mb-3">
                    <label class="form-label">Respuesta correcta</label>
                    <select class="form-select" th:field="*{correcto}">
                        <option value="true">Verdadero</option>
                        <option value="false">Falso</option>
                    </select>
                </div>

                <div th:if="*{tipo} == 'SELECCION_UNICA'" class="mb-3">
                    <label class="form-label">Opciones (separadas por coma)</label>
                    <input type="text" class="form-control" th:field="*{opciones}" placeholder="opcion1, opcion2, opcion3">
                    <label class="form-label mt-2">Opci&oacute;n correcta</label>
                    <input type="text" class="form-control" th:field="*{correcta}" placeholder="opcion correcta">
                </div>

                <div th:if="*{tipo} == 'SELECCION_MULTIPLE'" class="mb-3">
                    <label class="form-label">Opciones (separadas por coma)</label>
                    <input type="text" class="form-control" th:field="*{opciones}" placeholder="opcion1, opcion2, opcion3">
                    <label class="form-label mt-2">Opciones correctas (separadas por coma)</label>
                    <input type="text" class="form-control" th:field="*{correctas}" placeholder="opcion1, opcion3">
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Guardar</button>
                    <a class="btn btn-secondary" th:href="@{/preguntas}">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
    <div th:replace="~{fragments/menu :: footer}"></div>
    <script th:src="@{/bootstrap/bootstrap.bundle.min.js}"></script>
</body>
</html>
