<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario de Pregunta - Gesti&oacute;n de Preguntas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="/">Gesti&oacute;n de Preguntas</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/preguntas}">Listado de Preguntas</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">API REST</a>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" href="/swagger-ui/index.html">Swagger UI</a></li>
                            <li><a class="dropdown-item" href="/v3/api-docs">API Docs (JSON)</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="form-card">
            <h1 th:if="${pregunta.id != null}">Editar Pregunta</h1>
            <h1 th:unless="${pregunta.id != null}">Nueva Pregunta</h1>

            <form th:action="@{/preguntas/guardar}" th:object="${pregunta}" method="post">
                <input type="hidden" th:field="*{id}">

                <div class="mb-3">
                    <label class="form-label">Enunciado</label>
                    <input type="text" class="form-control" th:field="*{enunciado}" placeholder="Ingrese el enunciado de la pregunta">
                    <div class="error-text" th:if="${#fields.hasErrors('enunciado')}" th:errors="*{enunciado}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Descripci&oacute;n</label>
                    <textarea class="form-control" th:field="*{descripcion}" placeholder="Ingrese una descripci&oacute;n detallada" rows="3"></textarea>
                    <div class="error-text" th:if="${#fields.hasErrors('descripcion')}" th:errors="*{descripcion}"></div>
                </div>

                <div class="row">
                    <div class="col-md-3 mb-3">
                        <label class="form-label">Puntaje</label>
                        <input type="number" step="0.01" class="form-control" th:field="*{puntaje}" placeholder="0.00">
                        <div class="error-text" th:if="${#fields.hasErrors('puntaje')}" th:errors="*{puntaje}"></div>
                    </div>

                    <div class="col-md-3 mb-3">
                        <label class="form-label">Dificultad (1-5)</label>
                        <input type="number" class="form-control" th:field="*{dificultad}" placeholder="1" min="1" max="5">
                        <div class="error-text" th:if="${#fields.hasErrors('dificultad')}" th:errors="*{dificultad}"></div>
                    </div>

                    <div class="col-md-3 mb-3">
                        <label class="form-label">Tipo</label>
                        <select class="form-select" th:field="*{tipo}">
                            <option value="">-- Seleccionar tipo --</option>
                            <option value="MULTIPLE">Opci&oacute;n M&uacute;ltiple</option>
                            <option value="VF">Verdadero / Falso</option>
                            <option value="CORTA">Respuesta Corta</option>
                            <option value="DESARROLLO">Desarrollo</option>
                        </select>
                        <div class="error-text" th:if="${#fields.hasErrors('tipo')}" th:errors="*{tipo}"></div>
                    </div>

                    <div class="col-md-3 mb-3">
                        <label class="form-label">Tem&aacute;tica</label>
                        <select class="form-select" th:field="*{tematica}">
                            <option value="">-- Seleccionar tem&aacute;tica --</option>
                            <option th:each="tem : ${tematicas}" th:value="${tem.id}" th:text="${tem.nombre}"></option>
                        </select>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Guardar</button>
                    <a class="btn btn-secondary" th:href="@{/preguntas}">Cancelar</a>
                </div>
            </form>
        </div>
    </div>

    <div class="footer">
        <div class="container">
            <p class="mb-0">&copy; 2024 Sistema de Gesti&oacute;n de Preguntas. Todos los derechos reservados.</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
