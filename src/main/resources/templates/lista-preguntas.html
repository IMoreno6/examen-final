<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Lista de Preguntas - Gesti&oacute;n de Preguntas</title>
    <link th:href="@{/bootstrap/bootstrap.min.css}" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
    <nav th:replace="~{fragments/menu :: navbar}"></nav>
    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 style="font-size: 1.5rem; font-weight: 700; color: var(--dark); letter-spacing: -0.03em; margin: 0;">
                Listado de Preguntas
            </h1>
            <a class="btn btn-success" th:href="@{/preguntas/nuevo}" sec:authorize="hasRole('ADMIN')">+ A&ntilde;adir Nueva Pregunta</a>
        </div>

        <form class="filter-form row g-3" th:action="@{/preguntas}" method="get">
            <div class="col-md-4">
                <label class="form-label">Tem&aacute;tica</label>
                <select class="form-select" name="tematicaId">
                    <option value="">-- Todas las tem&aacute;ticas --</option>
                    <option th:each="tem : ${tematicas}" th:value="${tem.id}" th:text="${tem.nombre}" th:selected="${tematicaIdSel == tem.id}"></option>
                </select>
            </div>
            <div class="col-md-4">
                <label class="form-label">Tipo</label>
                <select class="form-select" name="tipo">
                    <option value="">-- Todos los tipos --</option>
                    <option value="VF" th:selected="${tipoSel == 'VF'}">Verdadero / Falso</option>
                    <option value="SELECCION_UNICA" th:selected="${tipoSel == 'SELECCION_UNICA'}">Selecci&oacute;n &Uacute;nica</option>
                    <option value="SELECCION_MULTIPLE" th:selected="${tipoSel == 'SELECCION_MULTIPLE'}">Selecci&oacute;n M&uacute;ltiple</option>
                </select>
            </div>
            <div class="col-md-4 d-flex align-items-end">
                <button type="submit" class="btn btn-primary w-100">Filtrar</button>
            </div>
        </form>

        <div class="table-responsive">
            <table class="table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Enunciado</th>
                        <th>Puntaje</th>
                        <th>Dif.</th>
                        <th>Tipo</th>
                        <th>Tem&aacute;tica</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="pregunta : ${preguntas.content}">
                        <td><strong th:text="${pregunta.id}">1</strong></td>
                        <td th:text="${pregunta.enunciado}">Enunciado</td>
                        <td th:text="${pregunta.puntaje}">0.00</td>
                        <td th:text="${pregunta.dificultad}">1</td>
                        <td>
                            <span th:if="${pregunta.tipo == 'VF'}" class="badge-tipo badge-tipo-vf">Verdadero / Falso</span>
                            <span th:if="${pregunta.tipo == 'SELECCION_UNICA'}" class="badge-tipo badge-tipo-corta">Selecci&oacute;n &Uacute;nica</span>
                            <span th:if="${pregunta.tipo == 'SELECCION_MULTIPLE'}" class="badge-tipo badge-tipo-multiple">Selecci&oacute;n M&uacute;ltiple</span>
                        </td>
                        <td th:text="${pregunta.tematica.nombre}">Tem&aacute;tica</td>
                        <td>
                            <th:block sec:authorize="hasRole('ADMIN')">
                                <a class="btn btn-warning btn-sm" th:href="@{/preguntas/editar/{id}(id=${pregunta.id})}">Editar</a>
                                <a class="btn btn-danger btn-sm" th:href="@{/preguntas/eliminar/{id}(id=${pregunta.id})}" onclick="return confirm('¿Estás seguro de eliminar esta pregunta?')">Eliminar</a>
                            </th:block>
                            <th:block sec:authorize="hasRole('USER')">
                                <span class="text-muted">Sin permisos</span>
                            </th:block>
                        </td>
                    </tr>
                    <tr th:if="${preguntas.totalElements == 0}">
                        <td colspan="7" class="text-center py-4" style="color: var(--secondary);">
                            No hay preguntas registradas.
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <nav th:if="${preguntas.totalPages > 1}" aria-label="Pagina de preguntas">
            <ul class="pagination justify-content-center">
                <li class="page-item" th:classappend="${!preguntas.hasPrevious()} ? 'disabled'">
                    <a class="page-link" th:href="@{/preguntas(page=0, tematicaId=${tematicaIdSel}, tipo=${tipoSel})}">&laquo;&laquo;</a>
                </li>
                <li class="page-item" th:classappend="${!preguntas.hasPrevious()} ? 'disabled'">
                    <a class="page-link" th:href="@{/preguntas(page=${preguntas.number - 1}, tematicaId=${tematicaIdSel}, tipo=${tipoSel})}">&laquo;</a>
                </li>
                <li class="page-item" th:each="i : ${#numbers.sequence(0, preguntas.totalPages - 1)}" th:classappend="${i == preguntas.number} ? 'active'">
                    <a class="page-link" th:href="@{/preguntas(page=${i}, tematicaId=${tematicaIdSel}, tipo=${tipoSel})}" th:text="${i + 1}">1</a>
                </li>
                <li class="page-item" th:classappend="${!preguntas.hasNext()} ? 'disabled'">
                    <a class="page-link" th:href="@{/preguntas(page=${preguntas.number + 1}, tematicaId=${tematicaIdSel}, tipo=${tipoSel})}">&raquo;</a>
                </li>
                <li class="page-item" th:classappend="${!preguntas.hasNext()} ? 'disabled'">
                    <a class="page-link" th:href="@{/preguntas(page=${preguntas.totalPages - 1}, tematicaId=${tematicaIdSel}, tipo=${tipoSel})}">&raquo;&raquo;</a>
                </li>
            </ul>
        </nav>
    </div>
    <div th:replace="~{fragments/menu :: footer}"></div>
    <script th:src="@{/bootstrap/bootstrap.bundle.min.js}"></script>
</body>
</html>
